<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="gel-orange" gradientUnits="userSpaceOnUse" x1="50" y1="50" x2="350" y2="350">
      <stop offset="0%" stop-color="#ff6b4a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#911f0d" stop-opacity="0.65"/>
    </linearGradient>

    <linearGradient id="gel-peach" gradientUnits="userSpaceOnUse" x1="50" y1="350" x2="200" y2="100">
      <stop offset="0%" stop-color="#ffe6e1" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d1b8b3" stop-opacity="0.70"/>
    </linearGradient>

    <linearGradient id="gel-peach-dark" gradientUnits="userSpaceOnUse" x1="280" y1="60" x2="280" y2="220">
      <stop offset="0%" stop-color="#bda09a" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#80625d" stop-opacity="0.65"/>
    </linearGradient>

    <linearGradient id="gel-highlight" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1.0"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#591c10" flood-opacity="0.25"/>
    </filter>

    <mask id="mask-right-wall">
      <rect width="100%" height="100%" fill="white"/>
      <path d="M 282 60 L 282 220" stroke="black" stroke-width="44" stroke-linecap="round" fill="none"/>
    </mask>

    <mask id="mask-left-wall">
      <rect width="100%" height="100%" fill="white"/>
      <path d="M 118 160 L 118 220" stroke="black" stroke-width="44" stroke-linecap="round" fill="none"/>
    </mask>

    <mask id="mask-door">
      <rect width="100%" height="100%" fill="white"/>
      <path d="M 200 180 L 200 220" stroke="black" stroke-width="44" stroke-linecap="round" fill="none"/>
    </mask>

    <mask id="mask-roof">
      <rect width="100%" height="100%" fill="white"/>
      <path d="M 88 170 L 200 70 L 312 170" stroke="black" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </mask>
  </defs>

  <rect width="400" height="400" fill="#FCFAF9" rx="40"/>

  <g filter="url(#soft-shadow)">
    
    <path d="M 282 60 L 282 220" stroke="url(#gel-highlight)" stroke-width="49" stroke-linecap="round" fill="none" mask="url(#mask-right-wall)"/>
    <path d="M 282 60 L 282 220" stroke="url(#gel-peach-dark)" stroke-width="44" stroke-linecap="round" fill="none"/>

    <path d="M 118 160 L 118 220" stroke="url(#gel-highlight)" stroke-width="49" stroke-linecap="round" fill="none" mask="url(#mask-left-wall)"/>
    <path d="M 118 160 L 118 220" stroke="url(#gel-peach)" stroke-width="44" stroke-linecap="round" fill="none"/>

    <path d="M 200 180 L 200 220" stroke="url(#gel-highlight)" stroke-width="49" stroke-linecap="round" fill="none" mask="url(#mask-door)"/>
    <path d="M 200 180 L 200 220" stroke="url(#gel-orange)" stroke-width="44" stroke-linecap="round" fill="none" opacity="0.6"/>

    <path d="M 88 170 L 200 70 L 312 170" stroke="url(#gel-highlight)" stroke-width="49" stroke-linecap="round" stroke-linejoin="round" fill="none" mask="url(#mask-roof)"/>
    <path d="M 88 170 L 200 70 L 312 170" stroke="url(#gel-orange)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  </g>
</svg>
