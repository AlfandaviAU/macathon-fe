<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Primary Meta Tags -->
    <title>Dwllr.ai | AI-Powered Tenant & Tribe Matching</title>
    <meta name="title" content="Dwllr.ai | AI-Powered Tenant & Tribe Matching" />
    <meta name="description" content="Find your perfect living space and ideal roommates using advanced AI personality matching. Stop searching, start living." />
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Dwllr.ai | The Future of Renting" />
    <meta property="og:description" content="Match with properties and tribes based on vibe, lifestyle, and AI analysis." />
    
    <link rel="icon" type="image/svg+xml" href="/dwllr-mark.svg" />

    <!-- Performance & Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="theme-color" content="#e8553d" />

    <style>
      /* Base styles to prevent layout shifts before React mounts */
      html, body { 
        height: 100%; 
        margin: 0; 
        background-color: #09090b; /* Dark theme base for a sleek initial load */
        color: #ffffff;
        font-family: system-ui, -apple-system, sans-serif;
      } 
      #root { height: 100%; }
      
      /* Stylish hackathon-winning loading state */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #09090b;
        z-index: 9999;
        transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      .loader-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
        line-height: 1;
      }

      .loader-mark {
        display: block;
        width: 3.25rem;
        height: auto;
        max-height: 3.5rem;
        aspect-ratio: 284 / 218;
        object-fit: contain;
        filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.4));
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .loader-logo {
        margin: 0;
        padding: 0;
        font-size: 1.75rem;
        font-weight: 900;
        font-style: italic;
        letter-spacing: -0.05em;
        line-height: 1;
        background: linear-gradient(135deg, #e8553d, #ffb3a6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 16px rgba(232,85,61,0.25));
      }
      
      .loader-text {
        margin-top: 0.75rem;
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        color: rgba(255, 255, 255, 0.4);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      
      .loader-dot {
        width: 6px;
        height: 6px;
        background-color: #e8553d;
        border-radius: 50%;
        animation: bounce 1.5s infinite ease-in-out;
      }
      .loader-dot:nth-child(1) { animation-delay: -0.3s; }
      .loader-dot:nth-child(2) { animation-delay: -0.15s; }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.98); }
      }
      
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
        40% { transform: translateY(-4px); opacity: 1; box-shadow: 0 0 10px rgba(232,85,61,0.8); }
      }
    </style>
  </head>

  <body>
    <!-- Pre-hydration Splash Screen -->
    <div id="initial-loader">
      <div class="loader-brand">
        <img class="loader-mark" src="/dwllr-mark.svg" alt="" width="104" height="80" decoding="async" />
        <div class="loader-logo">Dwllr.ai</div>
      </div>
      <div class="loader-text">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
    </div>
    
    <!-- React App Root -->
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Smoothly remove the loader once React kicks in and the window loads
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          // Slight delay to ensure React has painted
          setTimeout(() => {
            loader.style.opacity = '0';
            loader.style.transform = 'scale(1.05)';
            setTimeout(() => loader.remove(), 600);
          }, 300);
        }
      });
    </script>
  </body>
</html>
